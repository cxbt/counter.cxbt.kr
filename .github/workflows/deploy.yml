name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_TITLE: ${{ vars.APP_TITLE }}
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate domain configuration
        shell: bash
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ -n "${CUSTOM_DOMAIN:-}" ]; then
            echo "Using custom domain: ${CUSTOM_DOMAIN}"
            exit 0
          fi

          if printf '%s' "${REPO_NAME}" | grep -Eq '^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+$'; then
            echo "Repository name looks like a domain (${REPO_NAME}) but CUSTOM_DOMAIN is not set." >&2
            echo "Add Settings > Secrets and variables > Actions > Variables > CUSTOM_DOMAIN before deploying." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Write custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: printf '%s\n' "$CUSTOM_DOMAIN" > out/CNAME

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
